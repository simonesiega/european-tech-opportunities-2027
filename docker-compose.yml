services:
  internships:
    build:
      context: .
      target: internships
    image: european-tech-internships-2027-cli:local

    env_file:
      - path: .env
        required: false

    environment:
      INTERNSHIPS_DATABASE_URL: sqlite:////app/data/internships.db
      INTERNSHIPS_SEARCH_CONFIG_DIR: /app/configs/searches
      INTERNSHIPS_CATEGORY_CONFIG_PATH: /app/configs/categories.yml
      INTERNSHIPS_README_PATH: /workspace/README.md
      INTERNSHIPS_LINKEDIN_CRAWL_AUTHORIZED: "${INTERNSHIPS_LINKEDIN_CRAWL_AUTHORIZED:-false}"

    volumes:
      - ./data:/app/data
      - ./configs:/app/configs:ro
      - ./:/workspace

    init: true

  site:
    build:
      context: .
      target: site
      args:
        SITE_URL: "${SITE_URL:-https://internship2027.simonesiega.com}"
    image: european-tech-internships-2027-site:local

    environment:
      SITE_URL: "${SITE_URL:-https://internship2027.simonesiega.com}"
      INTERNSHIPS_DATABASE_PATH: /app/data/internships.db

    volumes:
      - ./data:/app/data:ro

    ports:
      - "127.0.0.1:${INTERNSHIPS_SITE_PORT:-3000}:3000"

    init: true
    restart: unless-stopped
