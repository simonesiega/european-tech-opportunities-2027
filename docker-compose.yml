services:
  opportunities:
    build:
      context: .
      target: opportunities
    image: european-tech-opportunities-2027-cli:local

    env_file:
      - path: .env
        required: false

    environment:
      OPPORTUNITIES_DATABASE_URL: sqlite:////app/data/opportunities.db
      OPPORTUNITIES_SEARCH_CONFIG_DIR: /app/configs/searches
      OPPORTUNITIES_CATEGORY_CONFIG_PATH: /app/configs/categories.yml
      OPPORTUNITIES_README_PATH: /workspace/README.md
      OPPORTUNITIES_LINKEDIN_CRAWL_AUTHORIZED: "${OPPORTUNITIES_LINKEDIN_CRAWL_AUTHORIZED:-false}"

    volumes:
      - /srv/european-tech-opportunities-2027/data:/app/data
      - ./configs:/app/configs:ro
      - ./:/workspace

    command: ["db-upgrade"]
    init: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  site:
    build:
      context: .
      target: site
      args:
        SITE_URL: "${SITE_URL:-https://opportunities2027.simonesiega.com}"
    image: european-tech-opportunities-2027-site:local

    environment:
      SITE_URL: "${SITE_URL:-https://opportunities2027.simonesiega.com}"
      OPPORTUNITIES_DATABASE_PATH: /app/data/opportunities.db

    volumes:
      - /srv/european-tech-opportunities-2027/data:/app/data:ro

    depends_on:
      opportunities:
        condition: service_completed_successfully

    expose:
      - "3000"

    init: true
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
