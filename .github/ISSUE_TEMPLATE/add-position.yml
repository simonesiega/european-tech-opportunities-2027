name: Add a position
description: Suggest a European technology internship or New Grad role for the 2027 cycle.
title: "[Position]: "
body:
  - type: markdown
    attributes:
      value: Thanks for helping keep the directory useful and up to date.

  - type: dropdown
    id: employment-type
    attributes:
      label: Employment type
      options:
        - Internship
        - New Grad
    validations:
      required: true

  - type: input
    id: company
    attributes:
      label: Company
      placeholder: Example Ltd.
    validations:
      required: true

  - type: input
    id: role
    attributes:
      label: Role
      placeholder: Software Engineering Intern
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Location
      placeholder: City, Country or Remote
    validations:
      required: true

  - type: input
    id: application-url
    attributes:
      label: Public LinkedIn listing URL
      description: Use the unauthenticated HTTPS listing URL without tracking parameters.
      placeholder: https://www.linkedin.com/jobs/view/1234567890
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: This position is based in Europe and is intended for the 2027 cycle.
          required: true
        - label: I searched the directory and existing issues for duplicates.
          required: true
