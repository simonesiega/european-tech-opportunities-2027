name: Scrape jobs only

on:
  workflow_dispatch:
    inputs:
      open_pull_request:
        description: "Open a scrape-only pull request when README changes"
        required: false
        default: true
        type: boolean
      allow_state_rebuild:
        description: "Allow rebuilding SQLite when restored canonical state is incompatible"
        required: false
        default: false
        type: boolean
      deploy_to_vps:
        description: "Deploy reviewed durable state from main (skips collection)"
        required: false
        default: false
        type: boolean

concurrency:
  group: opportunity-collection
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      OPPORTUNITIES_LINKEDIN_CRAWL_AUTHORIZED: ${{ vars.LINKEDIN_CRAWL_AUTHORIZED }}
    steps:
      - name: Verify LinkedIn crawl authorization
        if: inputs.deploy_to_vps != true && vars.LINKEDIN_CRAWL_AUTHORIZED != 'true'
        run: |
          echo "Set the repository variable LINKEDIN_CRAWL_AUTHORIZED=true before collecting."
          exit 1

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.6"
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --frozen --dev

      - name: Require main branch for VPS deployment
        if: inputs.deploy_to_vps && github.ref != 'refs/heads/main'
        run: |
          echo "VPS deployment is permitted only from the main branch."
          exit 1

      - name: Restore canonical SQLite cache accelerator
        id: db-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: data/opportunities.db
          key: opportunities-db-${{ github.run_id }}
          restore-keys: opportunities-db-

      - name: Configure restricted VPS snapshot access
        env:
          VPS_BACKUP_SSH_PRIVATE_KEY: ${{ secrets.VPS_BACKUP_SSH_PRIVATE_KEY }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        shell: bash
        run: |
          if [ -z "$VPS_BACKUP_SSH_PRIVATE_KEY" ] || [ -z "$VPS_SSH_KNOWN_HOSTS" ]; then
            echo "Restricted backup key and verified known_hosts entry are required."
            exit 1
          fi
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$VPS_BACKUP_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_backup_ed25519"
          printf '%s\n' "$VPS_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_backup_ed25519" "$HOME/.ssh/known_hosts"

      - name: Reconcile cache with verified VPS snapshot
        env:
          VPS_BACKUP_HOST: ${{ secrets.VPS_HOST }}
          VPS_BACKUP_USER: ${{ vars.VPS_BACKUP_USER || 'opportunities-backup' }}
          VPS_BACKUP_PORT: ${{ vars.VPS_SSH_PORT || '22' }}
        shell: bash
        run: bash scripts/canonical_state_store.sh restore

      - name: Configure VPS SSH access for bootstrap
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        shell: bash
        run: |
          if [ -s data/opportunities.db ]; then
            echo "Canonical state was restored from verified cache or restricted VPS snapshot storage; VPS credentials are not needed."
            exit 0
          fi
          if [ -z "$VPS_SSH_PRIVATE_KEY" ] || [ -z "$VPS_SSH_KNOWN_HOSTS" ]; then
            echo "VPS SSH key and verified known_hosts entry are required when cache and durable state are absent."
            exit 1
          fi
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$VPS_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"

      - name: Bootstrap canonical state from VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ vars.VPS_SSH_PORT || '22' }}
        shell: bash
        run: |
          if [ -s data/opportunities.db ]; then
            echo "Using canonical state restored from verified cache or restricted VPS snapshot storage."
            exit 0
          fi
          if [[ ! "$VPS_HOST" =~ ^[A-Za-z0-9.-]+$ ]] \
            || [[ ! "$VPS_USER" =~ ^[A-Za-z_][A-Za-z0-9._-]*$ ]] \
            || [[ ! "$VPS_PORT" =~ ^[0-9]{1,5}$ ]]; then
            echo "VPS bootstrap configuration is missing or invalid."
            exit 1
          fi

          mkdir -p data
          ssh -i "$HOME/.ssh/id_ed25519" -p "$VPS_PORT" -o BatchMode=yes \
            "${VPS_USER}@${VPS_HOST}" \
            "cat /srv/european-tech-opportunities-2027/data/opportunities.db" \
            > data/opportunities.db
          uv run python -c "import sqlite3; db=sqlite3.connect('file:data/opportunities.db?mode=ro', uri=True); result=db.execute('PRAGMA integrity_check').fetchone(); db.close(); assert result == ('ok',), result"

      - name: Remove bootstrap SSH credential
        if: always()
        shell: bash
        run: rm -f "$HOME/.ssh/id_ed25519"

      - name: Migrate database
        shell: bash
        run: |
          if uv run opportunities db-upgrade; then
            exit 0
          fi
          if [ "${{ inputs.allow_state_rebuild }}" = "true" ]; then
            rm -f data/opportunities.db data/opportunities.db-*
            uv run opportunities db-upgrade
          else
            echo "Migration failed; use allow_state_rebuild only after backing up state."
            exit 1
          fi

      - name: Scrape, persist, and render README
        if: inputs.deploy_to_vps != true
        shell: bash
        run: |
          set +e
          uv run opportunities scrape
          code=$?
          set -e
          if [ "$code" -eq 1 ] || [ "$code" -eq 3 ]; then
            exit "$code"
          fi
          if [ "$code" -eq 2 ]; then
            echo "Partial success: successful searches were persisted; failed searches changed nothing."
          fi

      - name: Validate database and README
        run: uv run opportunities validate
      - name: Checkpoint SQLite
        run: uv run python -c "import sqlite3; db=sqlite3.connect('data/opportunities.db'); db.execute('PRAGMA wal_checkpoint(TRUNCATE)'); db.close()"

      - name: Publish and restore-verify VPS canonical snapshot
        id: canonical-snapshot
        env:
          VPS_BACKUP_HOST: ${{ secrets.VPS_HOST }}
          VPS_BACKUP_USER: ${{ vars.VPS_BACKUP_USER || 'opportunities-backup' }}
          VPS_BACKUP_PORT: ${{ vars.VPS_SSH_PORT || '22' }}
          CANONICAL_STATE_RETENTION_DAYS: ${{ vars.CANONICAL_STATE_RETENTION_DAYS || '365' }}
        shell: bash
        run: bash scripts/canonical_state_store.sh publish

      - name: Remove restricted VPS snapshot credentials
        if: always()
        shell: bash
        run: rm -f "$HOME/.ssh/id_backup_ed25519" "$HOME/.ssh/known_hosts"

      - name: Save canonical SQLite cache accelerator
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: data/opportunities.db
          key: opportunities-db-${{ github.run_id }}
      - name: Upload database backup and README
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: opportunities-state-${{ github.run_id }}
          retention-days: 30
          path: |
            ${{ steps.canonical-snapshot.outputs.snapshot_database }}
            ${{ steps.canonical-snapshot.outputs.snapshot_manifest }}
            README.md

      - name: Open or update scrape-only pull request
        if: inputs.open_pull_request
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if git diff --quiet -- README.md; then
            echo "No README changes."
            exit 0
          fi
          branch="automated/scrape-update"
          title="data: scrape position updates"
          body="Manual scrape-only update. Merge remains manual."
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$branch:refs/remotes/origin/$branch" || true
          git checkout -B "$branch"
          git add README.md
          git commit -m "data: update position tables"
          git push --force-with-lease --set-upstream origin "$branch"
          if [ -z "$(gh pr list --head "$branch" --base main --state open --json number --jq '.[0].number')" ]; then
            gh pr create --title "$title" \
              --body "$body" \
              --base main --head "$branch"
          fi

      - name: Configure VPS SSH access for deployment
        if: inputs.deploy_to_vps && github.ref == 'refs/heads/main'
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        shell: bash
        run: |
          if [ -z "$VPS_SSH_PRIVATE_KEY" ] || [ -z "$VPS_SSH_KNOWN_HOSTS" ]; then
            echo "VPS SSH key and verified known_hosts entry are required."
            exit 1
          fi
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$VPS_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"

      - name: Deploy validated database to VPS
        if: inputs.deploy_to_vps && github.ref == 'refs/heads/main'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ vars.VPS_SSH_PORT || '22' }}
        shell: bash
        run: |
          set -euo pipefail
          trap 'rm -f "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"' EXIT

          if [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ]; then
            echo "VPS host and restricted deployment user are required."
            exit 1
          fi
          if [[ ! "$VPS_HOST" =~ ^[A-Za-z0-9.-]+$ ]] \
            || [[ ! "$VPS_USER" =~ ^[A-Za-z_][A-Za-z0-9._-]*$ ]] \
            || [[ ! "$VPS_PORT" =~ ^[0-9]{1,5}$ ]]; then
            echo "VPS SSH configuration contains unsupported characters."
            exit 1
          fi

          remote_dir="/srv/european-tech-opportunities-2027/data"
          remote_database="$remote_dir/opportunities.db"
          remote_previous="$remote_dir/opportunities.db.previous"
          remote_upload="$remote_dir/.opportunities-${GITHUB_RUN_ID}.db.upload"
          remote_lock="/srv/european-tech-opportunities-2027/.database-deploy.lock"

          database_sha=$(sha256sum data/opportunities.db | cut -d ' ' -f 1)
          ssh_target="${VPS_USER}@${VPS_HOST}"
          ssh_options=(-i "$HOME/.ssh/id_ed25519" -p "$VPS_PORT" -o BatchMode=yes)

          scp -i "$HOME/.ssh/id_ed25519" -P "$VPS_PORT" -o BatchMode=yes \
            data/opportunities.db "${ssh_target}:${remote_upload}"

          remote_sha=$(ssh "${ssh_options[@]}" "$ssh_target" \
            "sha256sum '$remote_upload' | cut -d ' ' -f 1")
          if [ "$database_sha" != "$remote_sha" ]; then
            ssh "${ssh_options[@]}" "$ssh_target" "rm -f '$remote_upload'"
            echo "Uploaded database checksum does not match."
            exit 1
          fi

          ssh "${ssh_options[@]}" "$ssh_target" \
            "IMPORT_FILE='$remote_upload' DATABASE_FILE='$remote_database' PREVIOUS_FILE='$remote_previous' LOCK_FILE='$remote_lock' EXPECTED_SHA='$database_sha' bash -s" <<'REMOTE'
          set -euo pipefail
          trap 'rm -f "$IMPORT_FILE"' EXIT

          exec 9>"$LOCK_FILE"
          flock -n 9

          test "$(sha256sum "$IMPORT_FILE" | cut -d " " -f 1)" = "$EXPECTED_SHA"

          if [ -f "$DATABASE_FILE" ]; then
            cp -p "$DATABASE_FILE" "$PREVIOUS_FILE"
          fi

          chgrp opportunities-site "$IMPORT_FILE"
          chmod 660 "$IMPORT_FILE"
          rm -f "${DATABASE_FILE}-wal" "${DATABASE_FILE}-shm" "${DATABASE_FILE}-journal"
          mv "$IMPORT_FILE" "$DATABASE_FILE"

          test "$(sha256sum "$DATABASE_FILE" | cut -d " " -f 1)" = "$EXPECTED_SHA"
          REMOTE