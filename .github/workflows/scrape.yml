name: Collect internships

on:
  workflow_dispatch:
    inputs:
      open_pull_request:
        description: "Open a pull request when README changes"
        required: false
        default: false
        type: boolean
      allow_state_rebuild:
        description: "Allow rebuilding SQLite when cached state is incompatible"
        required: false
        default: false
        type: boolean
      deploy_to_vps:
        description: "Atomically deploy the validated database to the VPS"
        required: false
        default: false
        type: boolean

concurrency:
  group: internship-collection
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  collect:
    if: vars.LINKEDIN_CRAWL_AUTHORIZED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      INTERNSHIPS_LINKEDIN_CRAWL_AUTHORIZED: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen --dev

      - name: Require main branch for VPS deployment
        if: inputs.deploy_to_vps && github.ref != 'refs/heads/main'
        run: |
          echo "VPS deployment is permitted only from the main branch."
          exit 1

      - name: Configure VPS SSH access
        if: inputs.deploy_to_vps && github.ref == 'refs/heads/main'
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        shell: bash
        run: |
          if [ -z "$VPS_SSH_PRIVATE_KEY" ] || [ -z "$VPS_SSH_KNOWN_HOSTS" ]; then
            echo "VPS SSH key and verified known_hosts entry are required."
            exit 1
          fi
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$VPS_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"

      - name: Restore canonical SQLite state
        id: db-cache
        uses: actions/cache/restore@v4
        with:
          path: data/internships.db
          key: internship-db-${{ github.run_id }}
          restore-keys: internship-db-

      - name: Bootstrap canonical state from VPS
        if: inputs.deploy_to_vps
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ vars.VPS_SSH_PORT || '22' }}
          VPS_VOLUME: ${{ vars.VPS_DOCKER_VOLUME }}
        shell: bash
        run: |
          if [ -s data/internships.db ]; then
            echo "Using canonical state restored from the GitHub Actions cache."
            exit 0
          fi
          if [[ ! "$VPS_HOST" =~ ^[A-Za-z0-9.-]+$ ]] \
            || [[ ! "$VPS_USER" =~ ^[A-Za-z_][A-Za-z0-9._-]*$ ]] \
            || [[ ! "$VPS_PORT" =~ ^[0-9]{1,5}$ ]] \
            || [[ ! "$VPS_VOLUME" =~ ^[A-Za-z0-9_.-]+$ ]]; then
            echo "VPS bootstrap configuration is missing or invalid."
            exit 1
          fi

          mkdir -p data
          ssh -i "$HOME/.ssh/id_ed25519" -p "$VPS_PORT" -o BatchMode=yes \
            "${VPS_USER}@${VPS_HOST}" \
            "docker run --rm -v '$VPS_VOLUME:/data:ro' alpine:3.22@sha256:14358309a308569c32bdc37e2e0e9694be33a9d99e68afb0f5ff33cc1f695dce cat /data/internships.db" \
            > data/internships.db
          uv run python -c "import sqlite3; db=sqlite3.connect('file:data/internships.db?mode=ro', uri=True); result=db.execute('PRAGMA integrity_check').fetchone(); db.close(); assert result == ('ok',), result"

      - name: Migrate database
        shell: bash
        run: |
          if uv run internships db-upgrade; then
            exit 0
          fi
          if [ "${{ inputs.allow_state_rebuild }}" = "true" ]; then
            rm -f data/internships.db data/internships.db-*
            uv run internships db-upgrade
          else
            echo "Migration failed; use allow_state_rebuild only after backing up state."
            exit 1
          fi

      - name: Scrape, persist, and render README
        shell: bash
        run: |
          set +e
          uv run internships scrape
          code=$?
          set -e
          if [ "$code" -eq 1 ] || [ "$code" -eq 3 ]; then
            exit "$code"
          fi
          if [ "$code" -eq 2 ]; then
            echo "Partial success: successful searches were persisted; failed searches changed nothing."
          fi
      - name: Validate database and README
        run: uv run internships validate
      - name: Checkpoint SQLite
        run: uv run python -c "import sqlite3; db=sqlite3.connect('data/internships.db'); db.execute('PRAGMA wal_checkpoint(TRUNCATE)'); db.close()"

      - name: Save canonical SQLite state
        uses: actions/cache/save@v4
        with:
          path: data/internships.db
          key: internship-db-${{ github.run_id }}
      - name: Upload database backup and README
        uses: actions/upload-artifact@v4
        with:
          name: internship-state-${{ github.run_id }}
          retention-days: 30
          path: |
            data/internships.db
            README.md

      - name: Open README update pull request
        if: inputs.open_pull_request
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if git diff --quiet -- README.md; then
            echo "No README changes."
            exit 0
          fi
          branch="automated/readme-update-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add README.md
          git commit -m "data: update internship table"
          git push --set-upstream origin "$branch"
          gh pr create --title "data: update internship table" \
            --body "Validated LinkedIn → SQLite → README update from run ${GITHUB_RUN_ID}." \
            --base main --head "$branch"

      - name: Deploy validated database to VPS
        if: inputs.deploy_to_vps && github.ref == 'refs/heads/main'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ vars.VPS_SSH_PORT || '22' }}
          VPS_VOLUME: ${{ vars.VPS_DOCKER_VOLUME }}
        shell: bash
        run: |
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ] || [ -z "$VPS_VOLUME" ]; then
            echo "VPS host, user, and Docker volume configuration are required."
            exit 1
          fi
          if [[ ! "$VPS_HOST" =~ ^[A-Za-z0-9.-]+$ ]] \
            || [[ ! "$VPS_USER" =~ ^[A-Za-z_][A-Za-z0-9._-]*$ ]] \
            || [[ ! "$VPS_PORT" =~ ^[0-9]{1,5}$ ]]; then
            echo "VPS SSH configuration contains unsupported characters."
            exit 1
          fi
          if [[ ! "$VPS_VOLUME" =~ ^[A-Za-z0-9_.-]+$ ]]; then
            echo "VPS Docker volume contains unsupported characters."
            exit 1
          fi

          remote_file="/tmp/internships-${GITHUB_RUN_ID}.db"
          database_sha=$(sha256sum data/internships.db | cut -d ' ' -f 1)
          ssh_target="${VPS_USER}@${VPS_HOST}"
          ssh_options=(-i "$HOME/.ssh/id_ed25519" -p "$VPS_PORT" -o BatchMode=yes)

          scp -i "$HOME/.ssh/id_ed25519" -P "$VPS_PORT" -o BatchMode=yes \
            data/internships.db "${ssh_target}:${remote_file}"
          remote_sha=$(ssh "${ssh_options[@]}" "$ssh_target" \
            "sha256sum '$remote_file' | cut -d ' ' -f 1")
          if [ "$database_sha" != "$remote_sha" ]; then
            ssh "${ssh_options[@]}" "$ssh_target" "rm -f '$remote_file'"
            echo "Uploaded database checksum does not match."
            exit 1
          fi

          ssh "${ssh_options[@]}" "$ssh_target" \
            "VPS_VOLUME='$VPS_VOLUME' IMPORT_FILE='$remote_file' EXPECTED_SHA='$database_sha' bash -s" <<'REMOTE'
          set -euo pipefail
          trap 'rm -f "$IMPORT_FILE"' EXIT
          docker volume inspect "$VPS_VOLUME" >/dev/null
          import_name=$(basename "$IMPORT_FILE")

          flock -n /tmp/internships-database-deploy.lock \
            docker run --rm --user 0 --entrypoint sh \
              -e IMPORT_NAME="$import_name" \
              -e EXPECTED_SHA="$EXPECTED_SHA" \
              -v "$VPS_VOLUME:/data" \
              -v /tmp:/incoming:ro \
              alpine:3.22@sha256:14358309a308569c32bdc37e2e0e9694be33a9d99e68afb0f5ff33cc1f695dce -euc '
                test "$(sha256sum "/incoming/$IMPORT_NAME" | cut -d " " -f 1)" = "$EXPECTED_SHA"
                if [ -f /data/internships.db ]; then
                  cp -p /data/internships.db /data/internships.db.previous
                fi
                cp "/incoming/$IMPORT_NAME" /data/.internships.db.new
                chown 10001:10001 /data/.internships.db.new
                chmod 640 /data/.internships.db.new
                rm -f /data/internships.db-wal /data/internships.db-shm \
                  /data/internships.db-journal
                mv /data/.internships.db.new /data/internships.db
                test "$(sha256sum /data/internships.db | cut -d " " -f 1)" = "$EXPECTED_SHA"
              '
          REMOTE
