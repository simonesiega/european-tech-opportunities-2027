name: Collect internships and New Grad roles

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      open_pull_request:
        description: "Open a pull request when README changes"
        required: false
        default: false
        type: boolean
      allow_state_rebuild:
        description: "Allow rebuilding SQLite when cached state is incompatible"
        required: false
        default: false
        type: boolean
      deploy_to_vps:
        description: "Atomically deploy the validated database to the VPS"
        required: false
        default: false
        type: boolean

concurrency:
  group: internship-collection
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      INTERNSHIPS_LINKEDIN_CRAWL_AUTHORIZED: ${{ vars.LINKEDIN_CRAWL_AUTHORIZED }}
    steps:
      - name: Verify LinkedIn crawl authorization
        if: vars.LINKEDIN_CRAWL_AUTHORIZED != 'true'
        run: |
          echo "Set the repository variable LINKEDIN_CRAWL_AUTHORIZED=true before collecting."
          exit 1

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.6"
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --frozen --dev

      - name: Require main branch for VPS deployment
        if: (inputs.deploy_to_vps || github.event_name == 'schedule') && github.ref != 'refs/heads/main'
        run: |
          echo "VPS deployment is permitted only from the main branch."
          exit 1

      - name: Restore canonical SQLite state
        id: db-cache
        uses: actions/cache/restore@v4
        with:
          path: data/internships.db
          key: internship-db-${{ github.run_id }}
          restore-keys: internship-db-

      - name: Configure VPS SSH access for bootstrap
        if: (inputs.deploy_to_vps || github.event_name == 'schedule') && github.ref == 'refs/heads/main'
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        shell: bash
        run: |
          if [ -z "$VPS_SSH_PRIVATE_KEY" ] || [ -z "$VPS_SSH_KNOWN_HOSTS" ]; then
            echo "VPS SSH key and verified known_hosts entry are required."
            exit 1
          fi
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$VPS_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"

      - name: Bootstrap canonical state from VPS
        if: inputs.deploy_to_vps || github.event_name == 'schedule'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ vars.VPS_SSH_PORT || '22' }}
        shell: bash
        run: |
          if [ -s data/internships.db ]; then
            echo "Using canonical state restored from the GitHub Actions cache."
            exit 0
          fi
          if [[ ! "$VPS_HOST" =~ ^[A-Za-z0-9.-]+$ ]] \
            || [[ ! "$VPS_USER" =~ ^[A-Za-z_][A-Za-z0-9._-]*$ ]] \
            || [[ ! "$VPS_PORT" =~ ^[0-9]{1,5}$ ]]; then
            echo "VPS bootstrap configuration is missing or invalid."
            exit 1
          fi

          mkdir -p data
          ssh -i "$HOME/.ssh/id_ed25519" -p "$VPS_PORT" -o BatchMode=yes \
            "${VPS_USER}@${VPS_HOST}" \
            "cat /srv/european-tech-internships/data/internships.db" \
            > data/internships.db
          uv run python -c "import sqlite3; db=sqlite3.connect('file:data/internships.db?mode=ro', uri=True); result=db.execute('PRAGMA integrity_check').fetchone(); db.close(); assert result == ('ok',), result"

      - name: Remove bootstrap SSH credentials
        if: always() && (inputs.deploy_to_vps || github.event_name == 'schedule')
        shell: bash
        run: rm -f "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"

      - name: Migrate database
        shell: bash
        run: |
          if uv run internships db-upgrade; then
            exit 0
          fi
          if [ "${{ inputs.allow_state_rebuild }}" = "true" ]; then
            rm -f data/internships.db data/internships.db-*
            uv run internships db-upgrade
          else
            echo "Migration failed; use allow_state_rebuild only after backing up state."
            exit 1
          fi

      - name: Scrape, persist, and render README
        shell: bash
        run: |
          set +e
          uv run internships scrape
          code=$?
          set -e
          if [ "$code" -eq 1 ] || [ "$code" -eq 3 ]; then
            exit "$code"
          fi
          if [ "$code" -eq 2 ]; then
            echo "Partial success: successful searches were persisted; failed searches changed nothing."
          fi
      - name: Validate database and README
        run: uv run internships validate
      - name: Checkpoint SQLite
        run: uv run python -c "import sqlite3; db=sqlite3.connect('data/internships.db'); db.execute('PRAGMA wal_checkpoint(TRUNCATE)'); db.close()"

      - name: Save canonical SQLite state
        uses: actions/cache/save@v4
        with:
          path: data/internships.db
          key: internship-db-${{ github.run_id }}
      - name: Upload database backup and README
        uses: actions/upload-artifact@v4
        with:
          name: internship-state-${{ github.run_id }}
          retention-days: 30
          path: |
            data/internships.db
            README.md

      - name: Open or update README pull request
        if: inputs.open_pull_request || github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if git diff --quiet -- README.md; then
            echo "No README changes."
            exit 0
          fi
          branch="automated/readme-update"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$branch:refs/remotes/origin/$branch" || true
          git checkout -B "$branch"
          git add README.md
          git commit -m "data: update position tables"
          git push --force-with-lease --set-upstream origin "$branch"
          if [ -z "$(gh pr list --head "$branch" --base main --state open --json number --jq '.[0].number')" ]; then
            gh pr create --title "data: update position tables" \
              --body "Validated LinkedIn → SQLite → README update from automated collection." \
              --base main --head "$branch"
          fi

      - name: Configure VPS SSH access for deployment
        if: (inputs.deploy_to_vps || github.event_name == 'schedule') && github.ref == 'refs/heads/main'
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        shell: bash
        run: |
          if [ -z "$VPS_SSH_PRIVATE_KEY" ] || [ -z "$VPS_SSH_KNOWN_HOSTS" ]; then
            echo "VPS SSH key and verified known_hosts entry are required."
            exit 1
          fi
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$VPS_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"

      - name: Deploy validated database to VPS
        if: (inputs.deploy_to_vps || github.event_name == 'schedule') && github.ref == 'refs/heads/main'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ vars.VPS_SSH_PORT || '22' }}
        shell: bash
        run: |
          set -euo pipefail
          trap 'rm -f "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"' EXIT

          if [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ]; then
            echo "VPS host and restricted deployment user are required."
            exit 1
          fi
          if [[ ! "$VPS_HOST" =~ ^[A-Za-z0-9.-]+$ ]] \
            || [[ ! "$VPS_USER" =~ ^[A-Za-z_][A-Za-z0-9._-]*$ ]] \
            || [[ ! "$VPS_PORT" =~ ^[0-9]{1,5}$ ]]; then
            echo "VPS SSH configuration contains unsupported characters."
            exit 1
          fi

          remote_dir="/srv/european-tech-internships/data"
          remote_database="$remote_dir/internships.db"
          remote_previous="$remote_dir/internships.db.previous"
          remote_upload="$remote_dir/.internships-${GITHUB_RUN_ID}.db.upload"
          remote_lock="/srv/european-tech-internships/.database-deploy.lock"

          database_sha=$(sha256sum data/internships.db | cut -d ' ' -f 1)
          ssh_target="${VPS_USER}@${VPS_HOST}"
          ssh_options=(-i "$HOME/.ssh/id_ed25519" -p "$VPS_PORT" -o BatchMode=yes)

          scp -i "$HOME/.ssh/id_ed25519" -P "$VPS_PORT" -o BatchMode=yes \
            data/internships.db "${ssh_target}:${remote_upload}"

          remote_sha=$(ssh "${ssh_options[@]}" "$ssh_target" \
            "sha256sum '$remote_upload' | cut -d ' ' -f 1")
          if [ "$database_sha" != "$remote_sha" ]; then
            ssh "${ssh_options[@]}" "$ssh_target" "rm -f '$remote_upload'"
            echo "Uploaded database checksum does not match."
            exit 1
          fi

          ssh "${ssh_options[@]}" "$ssh_target" \
            "IMPORT_FILE='$remote_upload' DATABASE_FILE='$remote_database' PREVIOUS_FILE='$remote_previous' LOCK_FILE='$remote_lock' EXPECTED_SHA='$database_sha' bash -s" <<'REMOTE'
          set -euo pipefail
          trap 'rm -f "$IMPORT_FILE"' EXIT

          exec 9>"$LOCK_FILE"
          flock -n 9

          test "$(sha256sum "$IMPORT_FILE" | cut -d " " -f 1)" = "$EXPECTED_SHA"

          if [ -f "$DATABASE_FILE" ]; then
            cp -p "$DATABASE_FILE" "$PREVIOUS_FILE"
          fi

          chgrp internships-site "$IMPORT_FILE"
          chmod 660 "$IMPORT_FILE"
          rm -f "${DATABASE_FILE}-wal" "${DATABASE_FILE}-shm" "${DATABASE_FILE}-journal"
          mv "$IMPORT_FILE" "$DATABASE_FILE"

          test "$(sha256sum "$DATABASE_FILE" | cut -d " " -f 1)" = "$EXPECTED_SHA"
          REMOTE