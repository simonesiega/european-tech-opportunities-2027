name: Python CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.6"
          python-version: "3.12"
          enable-cache: true
      - name: Install frozen dependencies
        run: uv sync --frozen --dev
      - name: Check formatting
        run: uv run ruff format --check .
      - name: Lint Python
        run: uv run ruff check .

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.6"
          python-version: "3.12"
          enable-cache: true
      - name: Install frozen dependencies
        run: uv sync --frozen --dev
      - name: Check types
        run: uv run mypy src tests scripts
      - name: Run offline tests with critical-path branch coverage
        run: |
          mkdir -p quality-reports
          uv run pytest -m "not live and not performance" --cov \
            --cov-report=term-missing \
            --cov-report=xml:quality-reports/coverage.xml \
            --cov-report=json:quality-reports/coverage.json \
            --cov-report=html:quality-reports/coverage-html
      - name: Add coverage report to job summary
        if: always()
        shell: bash
        run: |
          if [ -f .coverage ]; then
            echo "## Critical Python coverage" >> "$GITHUB_STEP_SUMMARY"
            uv run coverage report --format=markdown --fail-under=0 >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Benchmark parsing and classification
        run: |
          mkdir -p quality-reports
          uv run pytest tests/benchmarks --benchmark-only \
            --benchmark-json=quality-reports/benchmark.json
      - name: Check migration consistency
        run: uv run python scripts/check_migrations.py
      - name: Check documentation links
        run: uv run python scripts/check_docs.py
      - name: Smoke-test migration and rendering
        env:
          OPPORTUNITIES_DATABASE_URL: sqlite:///data/ci.db
        run: |
          mkdir -p data
          uv run opportunities db-upgrade
          uv run opportunities render
          uv run opportunities validate
      - name: Publish coverage and benchmark reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: python-quality-reports-${{ github.run_id }}
          path: quality-reports/
          if-no-files-found: warn
          retention-days: 30
