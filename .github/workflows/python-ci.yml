name: Python CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install frozen dependencies
        run: uv sync --frozen --dev
      - name: Check formatting
        run: uv run ruff format --check .
      - name: Lint Python
        run: uv run ruff check .

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install frozen dependencies
        run: uv sync --frozen --dev
      - name: Check types
        run: uv run mypy src tests
      - name: Run offline tests
        run: uv run pytest -m "not live"
      - name: Check migration consistency
        run: uv run python scripts/check_migrations.py
      - name: Smoke-test migration and rendering
        env:
          INTERNSHIPS_DATABASE_URL: sqlite:///data/ci.db
        run: |
          uv run alembic upgrade head
          uv run internships render
          uv run internships validate
