name: Nightly full update

on:
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: opportunity-collection
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  check-then-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      OPPORTUNITIES_LINKEDIN_CRAWL_AUTHORIZED: ${{ vars.LINKEDIN_CRAWL_AUTHORIZED }}
    steps:
      - name: Verify LinkedIn crawl authorization
        if: vars.LINKEDIN_CRAWL_AUTHORIZED != 'true'
        run: |
          echo "Set the repository variable LINKEDIN_CRAWL_AUTHORIZED=true before collecting."
          exit 1

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.6"
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --frozen --dev

      - name: Restore canonical SQLite cache accelerator
        uses: actions/cache/restore@v4
        with:
          path: data/opportunities.db
          key: opportunities-db-${{ github.run_id }}
          restore-keys: opportunities-db-

      - name: Configure restricted VPS snapshot access
        env:
          VPS_BACKUP_SSH_PRIVATE_KEY: ${{ secrets.VPS_BACKUP_SSH_PRIVATE_KEY }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        shell: bash
        run: |
          if [ -z "$VPS_BACKUP_SSH_PRIVATE_KEY" ] || [ -z "$VPS_SSH_KNOWN_HOSTS" ]; then
            echo "Restricted backup key and verified known_hosts entry are required."
            exit 1
          fi
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$VPS_BACKUP_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_backup_ed25519"
          printf '%s\n' "$VPS_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_backup_ed25519" "$HOME/.ssh/known_hosts"

      - name: Reconcile cache with verified VPS snapshot
        env:
          VPS_BACKUP_HOST: ${{ secrets.VPS_HOST }}
          VPS_BACKUP_USER: ${{ vars.VPS_BACKUP_USER || 'opportunities-backup' }}
          VPS_BACKUP_PORT: ${{ vars.VPS_SSH_PORT || '22' }}
        shell: bash
        run: bash scripts/canonical_state_store.sh restore

      - name: Configure VPS SSH access for bootstrap
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        shell: bash
        run: |
          if [ -s data/opportunities.db ]; then
            echo "Canonical state was restored from verified cache or restricted VPS snapshot storage; VPS credentials are not needed."
            exit 0
          fi
          if [ -z "$VPS_SSH_PRIVATE_KEY" ] || [ -z "$VPS_SSH_KNOWN_HOSTS" ]; then
            echo "VPS SSH key and verified known_hosts entry are required when cache and durable state are absent."
            exit 1
          fi
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$VPS_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"

      - name: Bootstrap canonical state from VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ vars.VPS_SSH_PORT || '22' }}
        shell: bash
        run: |
          if [ -s data/opportunities.db ]; then
            exit 0
          fi
          if [[ ! "$VPS_HOST" =~ ^[A-Za-z0-9.-]+$ ]] \
            || [[ ! "$VPS_USER" =~ ^[A-Za-z_][A-Za-z0-9._-]*$ ]] \
            || [[ ! "$VPS_PORT" =~ ^[0-9]{1,5}$ ]]; then
            echo "VPS bootstrap configuration is missing or invalid."
            exit 1
          fi

          mkdir -p data
          ssh -i "$HOME/.ssh/id_ed25519" -p "$VPS_PORT" -o BatchMode=yes \
            "${VPS_USER}@${VPS_HOST}" \
            "cat /srv/european-tech-opportunities-2027/data/opportunities.db" \
            > data/opportunities.db
          uv run python -c "import sqlite3; db=sqlite3.connect('file:data/opportunities.db?mode=ro', uri=True); result=db.execute('PRAGMA integrity_check').fetchone(); db.close(); assert result == ('ok',), result"

      - name: Remove bootstrap SSH credential
        if: always()
        shell: bash
        run: rm -f "$HOME/.ssh/id_ed25519"

      - name: Migrate database
        run: uv run opportunities db-upgrade

      - name: Check every stored job detail page
        shell: bash
        run: |
          set +e
          uv run opportunities check-availability
          code=$?
          set -e
          if [ "$code" -eq 2 ]; then
            echo "Partial availability audit: inconclusive responses were preserved."
          elif [ "$code" -ne 0 ]; then
            exit "$code"
          fi

      - name: Scrape only after availability check finishes
        shell: bash
        run: |
          set +e
          uv run opportunities scrape
          code=$?
          set -e
          if [ "$code" -eq 1 ] || [ "$code" -eq 3 ]; then
            exit "$code"
          fi
          if [ "$code" -eq 2 ]; then
            echo "Partial success: successful searches were persisted; failed searches changed nothing."
          fi

      - name: Validate combined database and README
        run: uv run opportunities validate
      - name: Checkpoint SQLite
        run: uv run python -c "import sqlite3; db=sqlite3.connect('data/opportunities.db'); db.execute('PRAGMA wal_checkpoint(TRUNCATE)'); db.close()"

      - name: Publish and restore-verify VPS canonical snapshot
        id: canonical-snapshot
        env:
          VPS_BACKUP_HOST: ${{ secrets.VPS_HOST }}
          VPS_BACKUP_USER: ${{ vars.VPS_BACKUP_USER || 'opportunities-backup' }}
          VPS_BACKUP_PORT: ${{ vars.VPS_SSH_PORT || '22' }}
          CANONICAL_STATE_RETENTION_DAYS: ${{ vars.CANONICAL_STATE_RETENTION_DAYS || '365' }}
        shell: bash
        run: bash scripts/canonical_state_store.sh publish

      - name: Remove restricted VPS snapshot credentials
        if: always()
        shell: bash
        run: rm -f "$HOME/.ssh/id_backup_ed25519" "$HOME/.ssh/known_hosts"

      - name: Save canonical SQLite cache accelerator
        uses: actions/cache/save@v4
        with:
          path: data/opportunities.db
          key: opportunities-db-${{ github.run_id }}
      - name: Upload nightly combined state
        uses: actions/upload-artifact@v4
        with:
          name: opportunities-nightly-state-${{ github.run_id }}
          retention-days: 30
          path: |
            ${{ steps.canonical-snapshot.outputs.snapshot_database }}
            ${{ steps.canonical-snapshot.outputs.snapshot_manifest }}
            README.md

      - name: Open or update one combined pull request
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if git diff --quiet -- README.md; then
            echo "No combined README changes."
            exit 0
          fi
          branch="automated/nightly-full-update"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$branch:refs/remotes/origin/$branch" || true
          git checkout -B "$branch"
          git add README.md
          git commit -m "data: nightly availability and scrape update"
          git push --force-with-lease --set-upstream origin "$branch"
          if [ -z "$(gh pr list --head "$branch" --base main --state open --json number --jq '.[0].number')" ]; then
            gh pr create --title "data: nightly availability and scrape update" \
              --body "Nightly full update: every stored listing was checked first, then collection ran. Merge remains manual." \
              --base main --head "$branch"
          fi
