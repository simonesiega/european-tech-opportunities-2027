name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install Python and dependencies
        run: uv sync --frozen --dev
      - name: Ruff format
        run: uv run ruff format --check .
      - name: Ruff lint
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy src tests
      - name: Offline tests
        run: uv run pytest -m "not live"
      - name: Migration consistency
        run: uv run python scripts/check_migrations.py
      - name: Migration smoke test
        env:
          INTERNSHIPS_DATABASE_URL: sqlite:///data/ci.db
        run: |
          uv run alembic upgrade head
          uv run internships render
          uv run internships validate

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build production image
        run: docker build --tag european-tech-internships-2027:ci .
      - name: Check CLI in image
        run: docker run --rm european-tech-internships-2027:ci --help
