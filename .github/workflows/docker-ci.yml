name: Docker CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build production images
        run: docker compose build
      - name: Check CLI image
        run: docker compose run --rm internships --help
      - name: Check automatic migration and site database access
        run: |
          trap 'docker compose down --volumes' EXIT
          docker compose up --detach site
          for _ in $(seq 1 10); do
            if docker compose exec --no-TTY site node -e \
              "fetch('http://127.0.0.1:3000').then(response => process.exit(response.ok ? 0 : 1))"; then
              exit 0
            fi
            sleep 1
          done
          docker compose logs site internships
          exit 1
