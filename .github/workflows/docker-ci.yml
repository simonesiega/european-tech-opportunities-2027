name: Docker CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Prepare CI database bind mount
        run: |
          sudo install -d -m 2770 -o 10001 -g 10001 /srv/european-tech-opportunities-2027/data

      - name: Build production images
        run: docker compose build

      - name: Check CLI image
        run: docker compose run --rm opportunities --help

      - name: Check automatic migration and site database access
        run: |
          trap 'docker compose down --volumes' EXIT

          if ! docker compose up --detach site; then
            docker compose logs site opportunities
            exit 1
          fi

          for _ in $(seq 1 10); do
            if docker compose exec --no-TTY site node -e "fetch('http://127.0.0.1:3000').then(response => process.exit(response.ok ? 0 : 1))"; then
              exit 0
            fi
            sleep 1
          done

          docker compose logs site opportunities
          exit 1