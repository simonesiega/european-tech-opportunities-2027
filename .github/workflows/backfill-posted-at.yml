name: Backfill LinkedIn posting dates

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Preview changes or apply them to canonical state"
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - apply
      limit:
        description: "Maximum open jobs to inspect (1-250)"
        required: true
        default: "250"
        type: string
      offset:
        description: "Open jobs to skip in LinkedIn ID order"
        required: true
        default: "0"
        type: string
      deploy_to_vps:
        description: "Atomically deploy applied state to the VPS"
        required: true
        default: false
        type: boolean

concurrency:
  group: internship-collection
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      INTERNSHIPS_LINKEDIN_CRAWL_AUTHORIZED: ${{ vars.LINKEDIN_CRAWL_AUTHORIZED }}
    steps:
      - name: Verify LinkedIn crawl authorization
        if: vars.LINKEDIN_CRAWL_AUTHORIZED != 'true'
        run: |
          echo "Set the repository variable LINKEDIN_CRAWL_AUTHORIZED=true before backfilling."
          exit 1

      - name: Require main branch for apply mode
        if: inputs.mode == 'apply' && github.ref != 'refs/heads/main'
        run: |
          echo "Posting-date changes may be applied only from the main branch."
          exit 1

      - name: Validate bounded inputs
        env:
          BACKFILL_LIMIT: ${{ inputs.limit }}
          BACKFILL_OFFSET: ${{ inputs.offset }}
        shell: bash
        run: |
          if [[ ! "$BACKFILL_LIMIT" =~ ^[0-9]+$ ]] \
            || [ "$BACKFILL_LIMIT" -lt 1 ] \
            || [ "$BACKFILL_LIMIT" -gt 250 ]; then
            echo "limit must be an integer from 1 through 250."
            exit 1
          fi
          if [[ ! "$BACKFILL_OFFSET" =~ ^[0-9]+$ ]]; then
            echo "offset must be a non-negative integer."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.6"
          python-version: "3.12"
          enable-cache: true

      - run: uv sync --frozen --dev

      - name: Configure verified VPS SSH access
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        shell: bash
        run: |
          if [ -z "$VPS_SSH_PRIVATE_KEY" ] || [ -z "$VPS_SSH_KNOWN_HOSTS" ]; then
            echo "VPS SSH key and verified known_hosts entry are required."
            exit 1
          fi
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$VPS_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"

      - name: Download current canonical database from VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ vars.VPS_SSH_PORT || '22' }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$VPS_HOST" =~ ^[A-Za-z0-9.-]+$ ]] \
            || [[ ! "$VPS_USER" =~ ^[A-Za-z_][A-Za-z0-9._-]*$ ]] \
            || [[ ! "$VPS_PORT" =~ ^[0-9]{1,5}$ ]]; then
            echo "VPS configuration is missing or invalid."
            exit 1
          fi

          mkdir -p data
          ssh -i "$HOME/.ssh/id_ed25519" -p "$VPS_PORT" -o BatchMode=yes \
            "${VPS_USER}@${VPS_HOST}" \
            "cat /srv/european-tech-opportunities-27/data/opportunities.db" \
            > data/opportunities.db

          test -s data/opportunities.db
          uv run python -c "import sqlite3; db=sqlite3.connect('file:data/opportunities.db?mode=ro', uri=True); result=db.execute('PRAGMA integrity_check').fetchone(); db.close(); assert result == ('ok',), result"

      - name: Upload database before backfill
        uses: actions/upload-artifact@v4
        with:
          name: opportunities-before-posting-backfill-${{ github.run_id }}
          retention-days: 30
          path: data/opportunities.db

      - name: Migrate working database
        run: uv run internships db-upgrade

      - name: Preview posting-date backfill
        if: inputs.mode == 'dry-run'
        env:
          BACKFILL_LIMIT: ${{ inputs.limit }}
          BACKFILL_OFFSET: ${{ inputs.offset }}
        run: |
          uv run internships backfill-posted-at --dry-run \
            --limit "$BACKFILL_LIMIT" \
            --offset "$BACKFILL_OFFSET"

      - name: Apply posting-date backfill
        if: inputs.mode == 'apply'
        env:
          BACKFILL_LIMIT: ${{ inputs.limit }}
          BACKFILL_OFFSET: ${{ inputs.offset }}
        run: |
          uv run internships backfill-posted-at \
            --limit "$BACKFILL_LIMIT" \
            --offset "$BACKFILL_OFFSET"

      - name: Validate applied database and README
        if: inputs.mode == 'apply'
        run: uv run internships validate

      - name: Checkpoint and verify applied SQLite state
        if: inputs.mode == 'apply'
        run: |
          uv run python -c "import sqlite3; db=sqlite3.connect('data/opportunities.db'); db.execute('PRAGMA wal_checkpoint(TRUNCATE)'); result=db.execute('PRAGMA integrity_check').fetchone(); db.close(); assert result == ('ok',), result"

      - name: Upload database and README after backfill
        if: always() && inputs.mode == 'apply'
        uses: actions/upload-artifact@v4
        with:
          name: opportunities-after-posting-backfill-${{ github.run_id }}
          retention-days: 30
          path: |
            data/opportunities.db
            README.md

      - name: Save corrected canonical state for collection workflow
        if: inputs.mode == 'apply'
        uses: actions/cache/save@v4
        with:
          path: data/opportunities.db
          key: opportunities-db-${{ github.run_id }}

      - name: Deploy corrected database atomically to VPS
        if: inputs.mode == 'apply' && inputs.deploy_to_vps
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ vars.VPS_SSH_PORT || '22' }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "$VPS_HOST" =~ ^[A-Za-z0-9.-]+$ ]] \
            || [[ ! "$VPS_USER" =~ ^[A-Za-z_][A-Za-z0-9._-]*$ ]] \
            || [[ ! "$VPS_PORT" =~ ^[0-9]{1,5}$ ]]; then
            echo "VPS SSH configuration contains unsupported characters."
            exit 1
          fi

          remote_dir="/srv/european-tech-opportunities-27/data"
          remote_database="$remote_dir/opportunities.db"
          remote_previous="$remote_dir/opportunities.db.previous"
          remote_upload="$remote_dir/.posting-backfill-${GITHUB_RUN_ID}.db.upload"
          remote_lock="/srv/european-tech-opportunities-27/.database-deploy.lock"

          database_sha=$(sha256sum data/opportunities.db | cut -d ' ' -f 1)
          ssh_target="${VPS_USER}@${VPS_HOST}"
          ssh_options=(-i "$HOME/.ssh/id_ed25519" -p "$VPS_PORT" -o BatchMode=yes)

          scp -i "$HOME/.ssh/id_ed25519" -P "$VPS_PORT" -o BatchMode=yes \
            data/opportunities.db "${ssh_target}:${remote_upload}"

          remote_sha=$(ssh "${ssh_options[@]}" "$ssh_target" \
            "sha256sum '$remote_upload' | cut -d ' ' -f 1")
          if [ "$database_sha" != "$remote_sha" ]; then
            ssh "${ssh_options[@]}" "$ssh_target" "rm -f '$remote_upload'"
            echo "Uploaded database checksum does not match."
            exit 1
          fi

          ssh "${ssh_options[@]}" "$ssh_target" \
            "IMPORT_FILE='$remote_upload' DATABASE_FILE='$remote_database' PREVIOUS_FILE='$remote_previous' LOCK_FILE='$remote_lock' EXPECTED_SHA='$database_sha' bash -s" <<'REMOTE'
          set -euo pipefail
          trap 'rm -f "$IMPORT_FILE"' EXIT

          exec 9>"$LOCK_FILE"
          flock -n 9
          test "$(sha256sum "$IMPORT_FILE" | cut -d " " -f 1)" = "$EXPECTED_SHA"

          if [ -f "$DATABASE_FILE" ]; then
            cp -p "$DATABASE_FILE" "$PREVIOUS_FILE"
          fi

          chgrp internships-site "$IMPORT_FILE"
          chmod 660 "$IMPORT_FILE"
          rm -f "${DATABASE_FILE}-wal" "${DATABASE_FILE}-shm" "${DATABASE_FILE}-journal"
          mv "$IMPORT_FILE" "$DATABASE_FILE"
          test "$(sha256sum "$DATABASE_FILE" | cut -d " " -f 1)" = "$EXPECTED_SHA"
          REMOTE

      - name: Remove VPS SSH credentials
        if: always()
        run: rm -f "$HOME/.ssh/id_ed25519" "$HOME/.ssh/known_hosts"
