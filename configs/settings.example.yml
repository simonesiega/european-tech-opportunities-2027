# Optional YAML alternative to .env. Process environment values take precedence.
database_url: sqlite:///data/opportunities.db
readme_path: README.md
search_config_dir: configs/searches
category_config_path: configs/categories.yml
target_cycle: 2027
# search_max_pages: 4
# search_max_results: 100
# search_max_rechecks: 25
request_timeout_seconds: 20
connect_timeout_seconds: 10
max_retries: 3
retry_backoff_seconds: 0.5
rate_limit_seconds: 2.0
max_concurrency: 3
max_response_bytes: 15000000
closure_confirmation_runs: 2
linkedin_crawl_authorized: false
user_agent: european-tech-opportunities-27/0.1 (+https://github.com/simonesiega/european-tech-opportunities-27)
log_level: INFO
